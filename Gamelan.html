<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padukuhan Gamelan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#e0f2fe,#dbeafe);
    margin:0;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    color:white;
    padding:60px 20px;
    text-align:center;
}

.header h1{
    font-weight:700;
    letter-spacing:1px;
}

/* CARD */
.modern-card{
    border:none;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

/* LIST TANPA GARIS */
.fasilitas-list{
    list-style:none;
    padding:0;
    margin:0;
    text-align:center;
}

.fasilitas-list li{
    padding:18px 20px;
    font-weight:500;
    transition:0.3s ease;
    border-radius:12px;
}

.fasilitas-list li:hover{
    background:#e0f2fe;
    transform:translateX(5px);
}

.fasilitas-list a{
    text-decoration:none;
    color:#1e3a8a;
    font-weight:600;
}

/* BUTTON */
.btn-modern{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    border:none;
    border-radius:50px;
    padding:10px 30px;
    font-weight:600;
    transition:0.3s ease;
    color:white;
}

.btn-modern:hover{
    transform:scale(1.05);
    background:linear-gradient(135deg,#2563eb,#1e40af);
}
</style>

</head>
<body>

<header class="header">
    <h1>Padukuhan Gamelan</h1>
</header>

<main class="container my-5">

<section class="card modern-card mb-4">
<div class="card-body">
<h3 class="text-center mb-4 fw-bold text-primary">
Fasilitas Padukuhan Gamelan
</h3>

<ul class="fasilitas-list">
<li>
<a href="masjid.html#Taqwa">
🕌 Masjid Taqwa
</a>
</li>
<li>🏠 Mushola</li>
<li>🎭 Kebudayaan</li>
</ul>

</div>
</section>

<div class="text-center">
<button onclick="goBack()" class="btn btn-modern">
⬅ Kembali
</button>
</div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function goBack(){
    window.history.back();
}
</script>

</body>
</html>
