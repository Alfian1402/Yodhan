<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padukuhan Karangasem</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #f4f6f9;
}

/* Header lebih elegan */
header {
    background: linear-gradient(90deg, #1e3c72, #2a5298);
}

/* Card lebih modern */
.card {
    border: none;
    border-radius: 15px;
}

/* List lebih clean */
.list-group-item {
    border: none;
    text-align: center;
    font-weight: 500;
    padding: 18px;
    transition: 0.3s;
}

.list-group-item:hover {
    background-color: #eef3ff;
    transform: scale(1.02);
}

.list-group-item a {
    text-decoration: none;
    color: #2a5298;
    display: block;
}

/* Tombol lebih smooth */
.btn-secondary {
    border-radius: 30px;
    padding: 10px 30px;
}
</style>

</head>

<body>

<!-- HEADER -->
<header class="text-white text-center py-4 mb-4">
    <h1 class="fw-bold">Padukuhan Karangasem</h1>
</header>

<main class="container">

    <!-- FASILITAS -->
    <section class="card shadow mb-4">
        <div class="card-body">
            <h3 class="card-title mb-4 text-center">
                Fasilitas Padukuhan Karangasem
            </h3>

            <ul class="list-group list-group-flush">
                <li class="list-group-item">
                    <a href="masjid.html#Baitussallam">
                        🕌 Masjid Baitussallam
                    </a>
                </li>
                <li class="list-group-item">
                    <a href="masjid.html#Nuur-Iman">
                        🕌 Masjid Nuur Iman
                    </a>
                </li>
                <li class="list-group-item">
                    🏠 Mushola
                </li>
                <li class="list-group-item">
                    🎭 Kebudayaan
                </li>
            </ul>
        </div>
    </section>

    <!-- TOMBOL KEMBALI -->
    <div class="text-center mb-5">
        <button onclick="history.back()" class="btn btn-secondary">
            ⬅ Kembali
        </button>
    </div>

</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
