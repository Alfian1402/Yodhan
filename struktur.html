<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Struktur & Padukuhan</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e2e8f0, #f8fafc);
        }

        /* HEADER MEWAH */
        header.bg-primary {
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb) !important;
            padding: 80px 20px !important;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        /* Ornament Glow */
        header.bg-primary::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
            top: -120px;
            left: -120px;
        }

        header.bg-primary::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            bottom: -100px;
            right: -100px;
        }

        /* JUDUL UTAMA GRADIENT EMAS */
        header h1 {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #ffffff, #ffd700, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(255,215,0,0.4);
            margin-bottom: 10px;
        }

        /* SUB JUDUL BIRU GLOW */
        header h2 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #00f2ff, #ffffff, #00f2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0,255,255,0.3);
        }

        /* Card modern */
        .card {
            border-radius: 20px !important;
            border: none !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08) !important;
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15) !important;
        }

        /* Tombol fasilitas */
        .btn-success {
            border-radius: 12px;
            transition: 0.3s ease;
        }

        .btn-success:hover {
            transform: scale(1.05);
        }

        /* Tombol padukuhan */
        .btn-outline-primary {
            border-radius: 12px;
            transition: 0.3s ease;
        }

        .btn-outline-primary:hover {
            background: #2563eb;
            color: white;
            transform: scale(1.05);
        }

        /* Tombol kembali */
        .btn-secondary {
            border-radius: 12px;
        }

        @media (max-width: 576px) {
            header.bg-primary {
                padding: 60px 15px !important;
            }

            header h1 {
                font-size: 28px;
            }

            header h2 {
                font-size: 16px;
            }
        }
    </style>

</head>
